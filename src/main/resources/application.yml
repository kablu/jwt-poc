
spring:
  application:
    name: jwt-poc

  # H2 In-Memory Database — key rotation audit trail
  datasource:
    url: jdbc:h2:mem:jwkpocdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # Approach 1: Spring Security OAuth2 Resource Server
  # Points to the application's own JWKS endpoint (self-contained Auth+Resource Server)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json
          issuer-uri: ${jwk.issuer:https://poc.jwk-poc.local}

server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

# Application-specific JWK configuration
jwk:
  issuer: https://poc.jwk-poc.local
  audiences:
    - jwk-poc-api
  rotation:
    cron: "0 0 0 1 * *"  # Monthly rotation (1st of every month at midnight)

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.poc.jwkpoc: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
